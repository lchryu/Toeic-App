<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium TOEIC Auto-Checker</title>
  </head>
  <body>
    <div id="app"></div>

    <!-- Modal for Comments -->
    <div id="commentModal" class="modal-overlay" style="display: none;">
      <div class="modal-content glass-panel" style="width: 90%; max-width: 500px; padding: 1.5rem; display: flex; flex-direction: column; max-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h3 id="modalQuizTitle" style="font-size: 1.2rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">💬 Thảo luận</h3>
          <button onclick="window.closeComments()" class="btn btn-danger" style="padding: 5px 15px;">X</button>
        </div>
        <div id="commentList" style="flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 10px; min-height: 200px;">
           <!-- Comments will appear here -->
        </div>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="commentInput" class="form-control" placeholder="Viết bình luận..." style="flex-grow: 1;" onkeypress="if(event.key === 'Enter') window.sendComment()">
          <button class="btn btn-primary" onclick="window.sendComment()">Gửi</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
